name: CI-Features

on:
  push:
    branches: [ "feature/*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3.0.3
        with:
          dotnet-version: 6.0.x
      
      - name: Restore dependencies
        run: dotnet restore src/AlloroTechnologies.Humita.sln
    
      - name: Build
        run: dotnet build src/AlloroTechnologies.Humita.sln -c Debug --no-restore